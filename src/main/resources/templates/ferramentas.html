<html xmlns="http://www.thymeleaf.org">
    <head>
        <title>Listar Ferramentas</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </head>
    <body>
        <main>
            <h2>Ferramentas</h2>
            <div class='container'>
                <div class="card" th:each="ferramenta: ${ferramentas}">
                    <div class="card-body">
                      <h5 class="card-title" th:text="${ferramenta.nome}"></h5>
                      <h5 class="card-title" th:text="${ferramenta.horasUso}"></h5>
                      <h5 class="card-title" th:text="${ferramenta.vidaUtilMaxima}"></h5>
                    </div>
                </div>
                <a type="button" class="btn btn-primary" th:href="@{/cadastrar}">Cadastrar Ferramenta</a>
            </div>
        </main>
    </body>
</html>
